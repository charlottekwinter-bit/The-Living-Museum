name: Migrate all rooms to Groq API

on:
  workflow_dispatch:

permissions:
  contents: write
jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run migration
        run: python migrate_all_rooms.py

      - name: Commit changes
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "museum-bot"
          git config user.email "museum-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Migrate all room scripts from Anthropic to Groq API"
          git pull --rebase -X theirs https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git
          git push https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git
