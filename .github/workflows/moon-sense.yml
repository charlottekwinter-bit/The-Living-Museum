name: Moon Sense
on:
  push:
    branches: [main]
    paths:
      - "Sky/moon-request.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install ephem requests

      - name: Run Moon Sense
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python Sky/scripts/moon_sense.py

      - name: Commit response
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "museum-bot"
          git config user.email "museum-bot@users.noreply.github.com"
          git add Sky/moon-response.txt
          git add Sky/moon-visits.json
          git add museum-state.json
          git add journey/
          git diff --staged --quiet || git commit -m "Moon: sense generated"
          git pull --rebase -X theirs https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
